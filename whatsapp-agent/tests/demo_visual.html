  .phone-frame::after {

/* ═══════════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════════ */
function now() {
  return new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function coincide(clave, msg) {
  if (clave.length <= 4) {
    const re = new RegExp('\\b' + clave.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
    return re.test(msg);
  }
  return msg.toLowerCase().includes(clave.toLowerCase());
}

function buscarRespuesta(mensaje, respuestas) {
  const msg = mensaje.toLowerCase();
  let mejor = null, maxScore = 0;
  for (const item of respuestas) {
    let score = 0;
    for (const c of item.claves) {
      if (coincide(c, msg)) score++;
    }
    if (score > maxScore) { maxScore = score; mejor = item; }
  }
  return mejor;
}

function parseBold(txt) {
  return txt.replace(/\*([^*]+)\*/g, '<strong>$1</strong>');
}

function formatMsg(txt) {
  return parseBold(txt)
    .replace(/\n/g, '<br>');
}

function typingDelay(txt) {
  // ~28ms per char, clamped 600–3200ms
  return Math.min(3200, Math.max(600, txt.length * 28));
}

const DIAS     = ['lunes','martes','miércoles','miercoles','jueves','viernes','sábado','sabado','domingo','hoy','mañana','esta noche','esta tarde'];
const CONFIRMS = ['sí','si','claro','dale','me interesa','quiero','va','ok','perfecto','bueno','adelante'];

function esConfirmacion(msg) {
  const m = msg.toLowerCase();
  return CONFIRMS.some(c => m.includes(c)) || DIAS.some(d => m.includes(d));
}

function extraerNombre(msg) {
  const skip = new Set([
    'hola','buenos','buenas','gracias','quiero','necesito','para','una','un','me','mi','soy',
    // días de la semana — no extraer como nombres
    'lunes','martes','miércoles','miercoles','jueves','viernes','sábado','sabado','domingo',
    'hoy','mañana','esta','este','próximo','proximo','siguiente'
  ]);
  const words = msg.trim().split(/\s+/);
  const cands = words.filter(w => w.length > 2 && w[0] === w[0].toUpperCase() && !skip.has(w.toLowerCase()));
  if (cands.length > 0) return cands.slice(0,2).join(' ');
  return msg.trim().replace(/\b\w/g, c => c.toUpperCase());
}

function tieneDia(msg) {
  return DIAS.some(d => msg.toLowerCase().includes(d));
}

function tieneHora(msg) {
  return /\d{1,2}(am|pm|:\d{2})/i.test(msg);
}

  bub.className = `bubble ${role}`;
  bub.innerHTML = formatMsg(text) +
    `<div class="bubble-time">` +
    `<span>${now()}</span>` +
    (role === 'user' ? `<span class="tick">✓✓</span>` : '') +
    `</div>`;
  row.appendChild(bub);
  // Insert before typing indicator row
  chat.insertBefore(row, typingR);
  scrollBottom();
  if (callback) callback();
}

function showTyping() {
  typingR.style.display = 'flex';
  scrollBottom();
}

function hideTyping() {
  typingR.style.display = 'none';
}

function agentReply(text, delay) {
  showTyping();
  setTimeout(() => {
    hideTyping();
    addBubble('agent', text);
  }, delay || typingDelay(text));
}

/* ═══════════════════════════════════════════════════════════
   BRAIN
═══════════════════════════════════════════════════════════ */
function processMessage(msg) {
  const data = DEMOS[currentDemo];
  const msgL = msg.toLowerCase();

  /* ── Restaurante: multi-step order flow ─────────────────── */
  if (currentDemo === 'restaurante') {

    if (estado === 'pidiendo_nombre_pedido') {
      datosPedido.nombre = extraerNombre(msg);
      estado = 'pidiendo_direccion_pedido';
      agentReply(`Anotado, *${datosPedido.nombre}* 📝\n\n¿Cuál es tu *dirección* de entrega? (Sector/Calle, Caracas)`);
      return;
    }
    if (estado === 'pidiendo_direccion_pedido') {
      datosPedido.direccion = msg;
      estado = 'pidiendo_items_pedido';
      agentReply(`Perfecto 📍 Entregamos en *${msg}*.\n\n¿Qué deseas ordenar? Puedes pedir varios platos.\n_Ejemplo: 2 arepas reina pepiada, 1 pabellón criollo, 2 papelones_`);
      return;
    }
    if (estado === 'pidiendo_items_pedido') {
      const confirmTxt = data.confirmarPedido(datosPedido.nombre || 'Cliente', datosPedido.direccion || 'dirección indicada', msg);
      estado = 'confirmado';
      datosPedido = {};
      agentReply(confirmTxt, typingDelay(confirmTxt) * 0.7);
      return;
    }
    if (estado === 'pidiendo_nombre_reserva') {
      nombreCliente = extraerNombre(msg);
      estado = 'pidiendo_fecha_reserva';
      agentReply(`¡Perfecto, *${nombreCliente}*! 😊\n\n¿Para qué *fecha y hora* y *cuántas personas*?\nEjemplo: _viernes a las 7pm para 4 personas_`);
      return;
    }
    if (estado === 'pidiendo_fecha_reserva') {
      const personasM = msg.match(/(\d+)\s*(person|pax|comens)/i);
      const personas  = personasM ? personasM[1] : '';
      const confirmTxt = data.confirmarReserva(nombreCliente || 'Cliente', msg, personas);
      estado = 'confirmado';
      nombreCliente = null;
      agentReply(confirmTxt, typingDelay(confirmTxt) * 0.7);
      return;
    }
  }

  /* ── Clínica & Inmobiliaria: paso 2 — recoger nombre ───────
     El agente ya tiene la fecha; ahora pide nombre y confirma.  */
  if (estado === 'pidiendo_nombre') {
    nombreCliente = extraerNombre(msg);
    const confirmTxt = data.confirmar(nombreCliente, fechaCita || msg, infoEspecialidad);
    estado        = 'confirmado';
    fechaCita     = null;
    infoEspecialidad = null;
    nombreCliente = null;
    agentReply(confirmTxt, typingDelay(confirmTxt) * 0.6);
    return;
  }

  /* ── Clínica & Inmobiliaria: paso 1 — recoger fecha/hora ────
     El agente ya sabe la especialidad; pide fecha y pasa a nombre. */
  if (estado === 'pidiendo_fecha') {
    fechaCita = msg;
    agentReply(
      `Perfecto, anotado para *${msg}* 📅\n\n` +
      `¿Me das tu *nombre completo* para confirmar la cita?`
    );
    estado = 'pidiendo_nombre';
    return;
  }

  /* ── General matching ───────────────────────────────────── */
  const resultado = buscarRespuesta(msg, data.respuestas);

  if (resultado) {
    agentReply(resultado.respuesta);

    if (currentDemo === 'restaurante') {
      if (resultado.intencion === 'pedido') {
        estado = 'pidiendo_nombre_pedido';
        datosPedido = {};
      } else if (resultado.intencion === 'reserva') {
        estado = 'pidiendo_nombre_reserva';
        nombreCliente = null;
      }
    } else {
      // Clínica e Inmobiliaria: activar flujo de cita/visita
      if (resultado.intencion && data.intencionesCita.includes(resultado.intencion)) {
        // Guardar info de especialidad para el resumen final
        infoEspecialidad = resultado.especialidad ? {
          especialidad: resultado.especialidad,
          doctor:       resultado.doctor,
          precio:       resultado.precio,
          horarios:     resultado.horarios || ''
        } : null;
        estado        = 'pidiendo_fecha';
        intencionActual = resultado.intencion;
        nombreCliente = null;
        fechaCita     = null;
      }
    }
  } else {
    agentReply(data.default);
  }
}

/* ═══════════════════════════════════════════════════════════
   SEND
═══════════════════════════════════════════════════════════ */
function sendMessage() {
  const msg = inputEl.value.trim();
  if (!msg) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  addBubble('user', msg);
  setTimeout(() => processMessage(msg), 120);
}

/* ═══════════════════════════════════════════════════════════
   SWITCH DEMO
═══════════════════════════════════════════════════════════ */
function switchDemo(name) {
  if (currentDemo === name) return;

  // Update cards
  document.querySelectorAll('.demo-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + name).classList.add('active');

  currentDemo      = name;
  estado           = 'general';
  intencionActual  = null;
  nombreCliente    = null;
  fechaCita        = null;
  infoEspecialidad = null;
  datosPedido      = {};

  const data = DEMOS[name];

  // Update header
  document.getElementById('waHeader').style.background = data.header;
  document.getElementById('waAvatar').textContent      = data.avatar;
  document.getElementById('waName').textContent        = data.empresa;
  document.getElementById('waStatus').textContent      = `${data.agent} · en línea`;
  document.getElementById('waSend').style.background   = data.header;

  // Clear messages
  const toRemove = [];
  for (const child of chat.children) {
    if (child.id !== 'typingRow' && !child.classList.contains('date-sep')) {
      toRemove.push(child);
    }
  }
  toRemove.forEach(el => el.remove());

  // Auto-greet
  setTimeout(() => {
    const greeting = data.respuestas.find(r => r.claves.includes('hola'));
    if (greeting) agentReply(greeting.respuesta, 700);
  }, 300);
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
// Today date label
document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('es', {
  weekday: 'long', day: 'numeric', month: 'long'
});

// Enter to send (Shift+Enter = newline)
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
});

// Initial greeting
window.addEventListener('load', () => {
  const data = DEMOS[currentDemo];
  const greeting = data.respuestas.find(r => r.claves.includes('hola'));
  if (greeting) agentReply(greeting.respuesta, 900);
});
</script>
